name: CI - Developer

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  fast-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: fast-check

    steps:
      - uses: actions/checkout@v4
      - run: docker build --target production -t frontend-test:ci .
      - run: |
          docker run -d -p 3000:3000 --name test-container frontend-test:ci
          sleep 5
          curl -f http://localhost:3000 || (docker logs test-container && docker stop test-container && exit 1)
          docker stop test-container
