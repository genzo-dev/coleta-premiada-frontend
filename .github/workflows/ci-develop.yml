name: CI - Developer

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  fast-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: fast-check

    steps:
      - uses: actions/checkout@v4
      - run: docker build --target production -t frontend-test:ci .
      - name: Smoke test
        run: |
          docker run -d -p 3000:3000 --name test-container frontend-test:ci
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:3000 >/dev/null; then
              echo "Frontend is up"
              docker stop test-container
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become healthy in time"
          docker logs test-container
          docker stop test-container
          exit 1
