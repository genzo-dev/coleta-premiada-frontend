services:
  frontend:
    build:
      context: .
      target: production
    env_file: .env
    ports:
      - "3000:3000"
    networks:
      coleta-shared: {}
      coleta-observability:
        aliases:
          - frontend

networks:
  # Rede criada pelo docker-compose do Coleta-Premiada; aqui só anexamos.
  coleta-shared:
    external: true
    name: coleta-shared
  coleta-observability:
    external: true
    name: coleta-observability
